{% assign lang = include.lang | default: page.lang | default: "en" %}
{% assign recipient = site.links.email | default: "prime.lab.tw@gmail.com" %}

<form
  class="contact-form"
  action="https://formsubmit.co/{{ recipient }}"
  method="POST"
  target="contact-submit-frame"
  data-contact-form
>
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_subject" value="[contact from website] Website contact">

  <div class="contact-form-grid">
    <label>
      {% if lang == "zh" %}聯絡信箱{% else %}Email{% endif %}
      <input type="email" name="email" required autocomplete="email">
    </label>

    <label>
      {% if lang == "zh" %}稱呼方式{% else %}Name / preferred form of address{% endif %}
      <input type="text" name="name" required autocomplete="name">
    </label>

    <label>
      {% if lang == "zh" %}單位{% else %}Affiliation{% endif %}
      <input type="text" name="affiliation" required>
    </label>

    <label>
      {% if lang == "zh" %}主旨{% else %}Subject{% endif %}
      <input type="text" name="subject" required data-contact-subject>
    </label>
  </div>

  <label class="contact-message">
    {% if lang == "zh" %}內文{% else %}Message{% endif %}
    <textarea name="message" rows="7" required></textarea>
  </label>

  <button class="contact-submit" type="submit">
    {% if lang == "zh" %}送出信件{% else %}Send message{% endif %}
  </button>

  <div class="contact-flight" aria-live="polite" hidden>
    <div class="contact-envelope"></div>
    <p>
      {% if lang == "zh" %}信件已送出。{% else %}Your message has been sent.{% endif %}
    </p>
  </div>
</form>

<iframe name="contact-submit-frame" class="contact-submit-frame" title="contact submission"></iframe>
