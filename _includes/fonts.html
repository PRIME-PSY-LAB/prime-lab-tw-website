<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@200;400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap"
  rel="stylesheet"
>

<!-- Font Awesome icons (load asynchronously due to size) -->
{% assign fontawesome = "https://use.fontawesome.com/releases/v6.7.0/css/all.css" %}
<link
  href="{{ fontawesome }}"
  rel="stylesheet"
  media="none"
  onload="this.removeAttribute('media'); this.onload = null;"
/>
<noscript>
  <link href="{{ fontawesome }}" rel="stylesheet">
</noscript>
